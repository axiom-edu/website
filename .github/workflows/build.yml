name: Build

on: [push, pull_request]

env:
  PUBLIC_SUPABASE_URL: "https://fake_test_url.supabase.co"
  PUBLIC_SUPABASE_ANON_KEY: "fake_anon_key"
  PRIVATE_SUPABASE_SERVICE_ROLE: "fake_service_role"
  PRIVATE_STRIPE_API_KEY: "fake_strip_api_key"

jobs:
  build_and_test:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: NPM install
        run: npm ci

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: SvelteKit Build
        run: npm run build
        continue-on-error: true

      - name: Debug SSR modules
        if: failure() || success()
        run: |
          echo "=== Checking SSR output files for syntax errors ==="
          find .svelte-kit/output/server -name '*.js' | while read f; do
            node --check "$f" 2>/dev/null || echo "SYNTAX ERROR IN: $f"
          done
          echo "=== Checking external dependencies ==="
          node -e "
          const deps = ['@stitches/core','@supabase/auth-ui-shared','@supabase/ssr','@supabase/supabase-js','@sveltejs/kit','clsx','cookie','devalue','handlebars','resend','set-cookie-parser','stripe'];
          async function test() {
            for (const dep of deps) {
              try { await import(dep); console.log('OK:', dep); }
              catch(e) { console.log('FAIL:', dep, e.message?.substring(0,200)); }
            }
          }
          test();
          "
          echo "=== Checking stylesheets JS files ==="
          for f in .svelte-kit/output/server/stylesheets/*.js; do
            node --check "$f" 2>/dev/null && echo "OK: $f" || echo "SYNTAX ERROR: $f"
          done
